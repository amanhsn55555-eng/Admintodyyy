<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم المركزية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Tajawal',sans-serif}
    body{background:#0f172a;min-height:100vh;color:#1e293b;display:flex;flex-direction:column}
    .header{background:linear-gradient(145deg,#f8fafc,#e2e8f0);box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,.1);border-radius:25px;margin:10px 10px 0;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}

    .header button{background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:20px;font-weight:bold;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:14px;flex:1;overflow-y:auto}
    .card-btn{background:linear-gradient(145deg,#f8fafc,#e2e8f0);box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,.1);border:none;border-radius:22px;padding:16px 8px;cursor:pointer;text-align:center;font-weight:700;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:6px}
    .card-btn:hover{transform:translateY(-3px)}
    .card-btn i{font-size:24px;color:#fbbf24}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:999;display:none;align-items:center;justify-content:center}
    .modal.show{display:flex}
    .modal-box{background:linear-gradient(145deg,#f8fafc,#e2e8f0);box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,.1);border-radius:28px;padding:20px 14px;width:94%;max-width:580px;max-height:80vh;overflow-y:auto;position:relative}
    .modal-box h3{margin-bottom:14px;font-size:18px;border-bottom:2px solid #e2e8f0;padding-bottom:8px}
    .modal-box label{display:block;margin:10px 0 4px;font-weight:700;font-size:13px}
    .modal-box input,.modal-box select{width:100%;padding:10px;border-radius:14px;border:2px solid #e2e8f0;background:#fff;font-size:13px;margin-bottom:4px}
    .close-modal{position:absolute;top:8px;left:12px;background:none;border:none;font-size:20px;cursor:pointer;color:#64748b}
    .toggle-row{display:flex;align-items:center;gap:10px;margin:10px 0}
    .toggle{position:relative;width:48px;height:26px;display:inline-block}
    .toggle input{display:none}
    .toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:26px;cursor:pointer;transition:.3s}
    .toggle-slider::before{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.3s}
    input:checked+.toggle-slider{background:#10b981}
    input:checked+.toggle-slider::before{transform:translateX(22px)}
    .btn-save{width:100%;padding:12px;border:none;border-radius:20px;background:#10b981;color:#fff;font-weight:bold;cursor:pointer;margin-top:10px}
    .btn-danger{background:#ef4444!important}
    .btn-info{background:#3b82f6!important}
    .list-item{background:#fff;border-radius:14px;padding:10px;margin:6px 0;display:flex;justify-content:space-between;align-items:center;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.04);gap:8px;flex-wrap:wrap}
    .list-item button{background:#ef4444;color:#fff;border:none;padding:5px 10px;border-radius:14px;cursor:pointer;font-size:11px;white-space:nowrap}
    .mini-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;border:2px solid #fbbf24;flex-shrink:0}
    .mini-avatar img{width:100%;height:100%;object-fit:cover}
    .tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;margin:2px}
    #toast{position:fixed;bottom:20px;left:20px;right:20px;text-align:center;background:#1e293b;color:#fff;padding:13px;border-radius:35px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;max-width:380px;margin:auto;font-weight:600}
    #toast.show{opacity:1;bottom:32px}
    .empty-state{text-align:center;padding:30px;color:#94a3b8}
    .withdraw-req{background:#fff;border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);border-right:4px solid #f59e0b}
    .withdraw-req .actions{display:flex;gap:8px;margin-top:10px}
    .withdraw-req .actions button{flex:1;padding:10px;border-radius:20px;border:none;font-weight:bold;cursor:pointer;color:#fff}
    .well-card{border:2px solid #2dd4bf;border-radius:18px;padding:14px;margin:8px 0;background:#f0fdfa}
    .well-card .level-badge{display:inline-block;background:#2dd4bf;color:#000;padding:4px 12px;border-radius:20px;font-weight:800;font-size:12px}
    .other-wells{background:#fef3c7;border-radius:12px;padding:8px 12px;margin:6px 0;font-size:12px}
  </style>
</head>

function toast(m,ok){ok=ok!==false;var t=document.getElementById('toast');t.textContent=m;t.style.background=ok?'#10b981':'#ef4444';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2800)}
window.closeModal=function(){document.getElementById('modal').classList.remove('show')}
function openModalHTML(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modal').classList.add('show')}
async function getSet(k,f){try{var s=await getDoc(doc(db,"admin_settings",k));return s.exists()?s.data().value:f}catch(e){return f}}
async function setSet(k,v){await setDoc(doc(db,"admin_settings",k),{value:v,updatedAt:Date.now()})}
function av(u){if(!u)return'👤';if(u.avatarType==='image'&&u.avatarUrl)return'<img src="'+u.avatarUrl+'" style="width:100%;height:100%;object-fit:cover">';return u.emoji||'👤'}
async function getUser(uid){try{var d=await getDoc(doc(db,"users",uid));if(d.exists()){var u=d.data();u.uid=uid;return u}}catch(e){}return{uid:uid,username:'مستخدم',emoji:'👤',userId:uid.slice(0,6)}}
async function getRes(uid){try{var d=await getDoc(doc(db,"resources",uid));if(d.exists())return d.data()}catch(e){}return{money:0,gold:0,elixir:0,oil:0,ddo:0}}

async function searchUser(sv){
  if(!sv)return null;
  var q=await getDocs(query(collection(db,"users"),where("userId","==",sv)));
  if(!q.empty){var u=q.docs[0].data();u.uid=q.docs[0].id;return u}
  q=await getDocs(query(collection(db,"users"),where("email","==",sv)));
  if(!q.empty){var u=q.docs[0].data();u.uid=q.docs[0].id;return u}
  var all=await getDocs(collection(db,"users"));var f=null;
  all.forEach(function(d){if(f)return;var u=d.data();if((u.username||'').toLowerCase().includes(sv.toLowerCase())){f=u;f.uid=d.id}});
  return f;
}

    {id:'richControl',i:'fa-crown',t:'👑 الأثرياء'},
    {id:'walletControl',i:'fa-wallet',t:'💳 المحافظ'},
    {id:'withdrawRequests',i:'fa-hand-holding-usd',t:'📋 طلبات السحب'},
    {id:'chargeSection',i:'fa-bolt',t:'⚡ شحن/استقطاع'},
    {id:'userControl',i:'fa-users',t:'👥 الأعضاء'},
    {id:'userStats',i:'fa-chart-bar',t:'📈 إحصائيات'},

    {id:'chatControl',i:'fa-sms',t:'💭 المحادثات'},
    {id:'reportsControl',i:'fa-flag',t:'🚨 البلاغات'},

window.openPanel=async function(id){
  switch(id){
    case'dashboard':await pDashboard();break;
    case'regResources':await pRegResources();break;
    case'regRestrict':await pRegRestrict();break;
    case'regToggle':await pRegToggle();break;
    case'postControl':await pPostControl();break;
    case'storyControl':await pStoryControl();break;
    case'roomControl':await pRoomControl();break;
    case'shopControl':await pShopControl();break;
    case'oilControl':await pOilControl();break;
    case'richControl':await pRichControl();break;
    case'walletControl':await pWalletControl();break;
    case'withdrawRequests':await pWithdrawRequests();break;
    case'chargeSection':await pChargeSection();break;
    case'userControl':await pUserControl();break;
    case'userStats':await pUserStats();break;
    case'ipDetect':await pIpDetect();break;
    case'chatControl':await pChatControl();break;
    case'reportsControl':await pReportsControl();break;
    case'notifControl':await pNotifControl();break;
    case'projectControl':await pProjectControl();break;
    case'ddoControl':await pDdoControl();break;
  }
};

// ========== الملخص ==========
async function pDashboard(){
  openModalHTML('<h3>📊ملخص التطبيق</h3><div id="dc" style="text-align:center">⏳</div>');
  var users=await getDocs(collection(db,"users"));
  var posts=await getDocs(collection(db,"posts"));
  var rooms=await getDocs(collection(db,"rooms"));
  var products=await getDocs(collection(db,"products"));
  var stories=await getDocs(collection(db,"stories"));
  var resources=await getDocs(collection(db,"resources"));
  var reports=await getDocs(collection(db,"reports"));
  var tm=0,tg=0,te=0,to=0,td=0;
  resources.forEach(function(d){var r=d.data();tm+=r.money||0;tg+=r.gold||0;te+=r.elixir||0;to+=r.oil||0;td+=r.ddo||0});
  var tl=0,tc=0;
  posts.forEach(function(d){var p=d.data();tl+=p.likes||0;tc+=(p.comments||[]).length});
  document.getElementById('dc').innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'+
    '<div style="background:#fff;border-radius:16px;padding:12px"><div style="font-size:24px;font-weight:900">'+users.size+'</div><small>👥 أعضاء</small></div>'+
    '<div style="background:#fff;border-radius:16px;padding:12px"><div style="font-size:24px;font-weight:900">'+posts.size+'</div><small>📰 منشورات</small></div>'+
    '<div style="background:#fff;border-radius:16px;padding:12px"><div style="font-size:24px;font-weight:900">'+rooms.size+'</div><small>🚪 غرف</small></div>'+
    '<div style="background:#fff;border-radius:16px;padding:12px"><div style="font-size:24px;font-weight:900">'+products.size+'</div><small>🛒 منتجات</small></div>'+
    '<div style="background:#fff;border-radius:16px;padding:12px"><div style="font-size:24px;font-weight:900">'+tc+'</div><small>💬 تعليقات</small></div>'+
    '<div style="background:#fff;border-radius:16px;padding:12px"><div style="font-size:24px;font-weight:900">'+reports.size+'</div><small>🚨 بلاغات</small></div>'+
    '</div>'+
    '<div style="background:#fef3c7;border-radius:14px;padding:10px;text-align:center">💎 ذهب:'+tg.toLocaleString()+' | إكسير:'+te.toLocaleString()+' | نفط:'+to.toLocaleString()+' | DDO:'+td.toLocaleString()+'</div>';
}

// ========== الإعدادات الأساسية ==========
async function pRegResources(){
  var m=await getSet('default_money',1000),g=await getSet('default_gold',10),e=await getSet('default_elixir',10),o=await getSet('default_oil',10),d=await getSet('default_ddo',0);
  openModalHTML('<h3>💰 عملات الحساب الجديد</h3><label>المال</label><input id="v1" type="number" value="'+m+'"><label>الذهب</label><input id="v2" type="number" value="'+g+'"><label>الإكسير</label><input id="v3" type="number" value="'+e+'"><label>النفط</label><input id="v4" type="number" value="'+o+'"><label>DDO</label><input id="v5" type="number" value="'+d+'"><button class="btn-save" onclick="saveRegResources()">💾 حفظ</button>');
}
window.saveRegResources=async function(){await setSet('default_money',+document.getElementById('v1').value);await setSet('default_gold',+document.getElementById('v2').value);await setSet('default_elixir',+document.getElementById('v3').value);await setSet('default_oil',+document.getElementById('v4').value);await setSet('default_ddo',+document.getElementById('v5').value);toast('✅ تم');closeModal()};

async function pRegRestrict(){
  var me=await getSet('min_email_len',5),mp=await getSet('min_pass_len',6),bp=(await getSet('banned_passwords',[])).join(', ');
  openModalHTML('<h3>🔒 قيود التسجيل</h3><label>أدنى طول للبريد</label><input id="v1" type="number" value="'+me+'"><label>أدنى طول لكلمة المرور</label><input id="v2" type="number" value="'+mp+'"><label>كلمات مرور ممنوعة</label><input id="v3" value="'+bp+'"><button class="btn-save" onclick="saveRegRestrict()">💾 حفظ</button>');
}
window.saveRegRestrict=async function(){await setSet('min_email_len',+document.getElementById('v1').value);await setSet('min_pass_len',+document.getElementById('v2').value);var arr=document.getElementById('v3').value.split(',').map(function(s){return s.trim()}).filter(Boolean);await setSet('banned_passwords',arr);toast('✅');closeModal()};

async function pRegToggle(){
  var v=await getSet('registration_open',true);
  openModalHTML('<h3>🚪 التسجيل</h3><div class="toggle-row"><span>التسجيل مفتوح:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="saveRegToggle()">💾 حفظ</button>');
}
window.saveRegToggle=async function(){await setSet('registration_open',document.getElementById('v1').checked);toast('✅');closeModal()};

async function pPostControl(){
  var ap=await getSet('allow_posting',true),ac=await getSet('allow_comments',true);
  openModalHTML('<h3>📰 المنشورات</h3><div class="toggle-row"><span>السماح بالنشر:</span><label class="toggle"><input id="v1" type="checkbox" '+(ap?'checked':'')+'><span class="toggle-slider"></span></label></div><div class="toggle-row"><span>السماح بالتعليقات:</span><label class="toggle"><input id="v2" type="checkbox" '+(ac?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="savePostControl()">💾 حفظ</button><button class="btn-save btn-danger" onclick="deleteAllPosts()">🗑️ حذف الكل</button>');
}
window.savePostControl=async function(){await setSet('allow_posting',document.getElementById('v1').checked);await setSet('allow_comments',document.getElementById('v2').checked);toast('✅');closeModal()};
window.deleteAllPosts=async function(){if(!confirm('حذف الكل؟'))return;var s=await getDocs(collection(db,"posts"));var b=writeBatch(db);s.forEach(function(d){b.delete(d.ref)});await b.commit();toast('🗑️ تم');closeModal()};

async function pStoryControl(){
  var v=await getSet('allow_stories',true);
  openModalHTML('<h3>⏰ القصص</h3><div class="toggle-row"><span>السماح بالقصص:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="saveStoryControl()">💾 حفظ</button><button class="btn-save btn-danger" onclick="deleteAllStories()">🗑️ حذف الكل</button>');
}
window.saveStoryControl=async function(){await setSet('allow_stories',document.getElementById('v1').checked);toast('✅');closeModal()};
window.deleteAllStories=async function(){if(!confirm('حذف الكل؟'))return;var s=await getDocs(collection(db,"stories"));var b=writeBatch(db);s.forEach(function(d){b.delete(d.ref)});await b.commit();toast('🗑️');closeModal()};

async function pRoomControl(){
  openModalHTML('<h3>🚪 الغرف</h3><div id="rc">⏳</div>');
  var v=await getSet('allow_create_rooms',true);
  var s=await getDocs(collection(db,"rooms"));var list='';
  if(s.empty){list='<div class="empty-state"><p>لا غرف</p></div>'}else{
    s.forEach(function(d){var r=d.data();var img=r.roomImage||r.image||'';
      list+='<div class="list-item"><div style="display:flex;align-items:center;gap:10px;flex:1">'+(img?'<img src="'+img+'" style="width:40px;height:40px;border-radius:10px;object-fit:cover">':'<div class="mini-avatar"><i class="fas fa-comments"></i></div>')+'<div><strong>'+(r.name||'غرفة')+'</strong><br><small>'+(r.members||[]).length+' عضو</small></div></div><button onclick="delRoom(\''+d.id+'\')">حذف</button></div>'});
  }
  document.getElementById('rc').innerHTML='<div class="toggle-row"><span>السماح بإنشاء الغرف:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="saveRoomControl()">💾 حفظ</button><div style="margin-top:10px">'+list+'</div>';
}
window.saveRoomControl=async function(){await setSet('allow_create_rooms',document.getElementById('v1').checked);toast('✅');closeModal()};
window.delRoom=async function(id){await deleteDoc(doc(db,"rooms",id));toast('🗑️');pRoomControl()};

async function pShopControl(){
  openModalHTML('<h3>🛒 المتجر</h3><div id="sc">⏳</div>');
  var s=await getDocs(collection(db,"products"));var list='';
  if(s.empty){list='<div class="empty-state"><p>لا منتجات</p></div>'}else{
    s.forEach(function(d){var p=d.data();
      list+='<div class="list-item"><div style="display:flex;align-items:center;gap:10px;flex:1">'+(p.image?'<img src="'+p.image+'" style="width:40px;height:40px;border-radius:10px;object-fit:cover">':'<div class="mini-avatar"><i class="fas fa-gift"></i></div>')+'<div><strong>'+p.type+'</strong> '+(p.idValue?'<span class="tag">#'+p.idValue+'</span>':'')+'<br><small>'+p.price+' '+p.currency+'</small></div></div><button onclick="delProd(\''+d.id+'\')">حذف</button></div>'});
  }
  document.getElementById('sc').innerHTML='<button class="btn-save btn-info" onclick="addProdUI()">+ منتج جديد</button><div style="margin-top:10px">'+list+'</div>';
}
window.delProd=async function(id){await deleteDoc(doc(db,"products",id));toast('🗑️');pShopControl()};
window.addProdUI=function(){openModalHTML('<h3>منتج جديد</h3><select id="pt"><option value="id">معرف</option><option value="frame">إطار</option><option value="name">اسم</option><option value="avatar">صورة</option><option value="verify">توثيق</option></select><input id="pv" placeholder="المعرف"><input id="pi" placeholder="رابط الصورة"><input id="pp" type="number" placeholder="السعر"><select id="pc"><option value="money">مال</option><option value="gold">ذهب</option><option value="elixir">إكسير</option></select><input id="pu" type="number" value="0" placeholder="استخدامات"><button class="btn-save" onclick="submitProd()">إضافة</button>')};
window.submitProd=async function(){await addDoc(collection(db,"products"),{type:document.getElementById('pt').value,idValue:document.getElementById('pv').value.trim(),image:document.getElementById('pi').value.trim(),price:+document.getElementById('pp').value,currency:document.getElementById('pc').value,uses:+document.getElementById('pu').value,createdAt:Date.now(),hidden:false});toast('✅');closeModal();pShopControl()};

// ========== الآبار ==========
async function pOilControl(){
  openModalHTML('<h3>🛢️ إدارة الآبار</h3><div id="oc">⏳</div>');

  openModalHTML('<h3>🚨 البلاغات</h3><div id="repc">⏳</div>');
  var allR=await getDocs(collection(db,"reports")),allP=await getDocs(collection(db,"posts"));
  var pm={};allP.forEach(function(d){pm[d.id]=d.data()});
  var list='';
  allR.forEach(function(d){var r=d.data();if(r.status!=='pending')return;var post=pm[r.postId]||{};
    list+='<div class="withdraw-req"><div style="display:flex;align-items:center;gap:10px"><div class="mini-avatar" style="background:#fee2e2;color:#dc2626"><i class="fas fa-flag"></i></div><div><strong>'+(r.reporterName||'مستخدم')+'</strong><br><small>'+new Date(r.timestamp).toLocaleString('ar-SA')+'</small></div></div>'+
    '<div style="background:#f8fafc;border-radius:10px;padding:10px;margin:8px 0"><strong>السبب:</strong> '+(r.reason||'?')+'<br><strong>المنشور:</strong> '+((post.content||'').substring(0,60))+'...</div>'+
    '<div class="actions"><button style="background:#10b981" onclick="acceptReport(\''+d.id+'\',\''+r.postId+'\')">✅ قبول</button><button style="background:#ef4444" onclick="rejectReport(\''+d.id+'\')">❌ رفض</button></div></div>'});
  document.getElementById('repc').innerHTML=list||'<div class="empty-state"><p>لا بلاغات</p></div>';
}
window.acceptReport=async function(rid,pid){
  if(!confirm('قبول؟'))return;
  var rd=await getDoc(doc(db,"reports",rid));if(!rd.exists())return;
  var cnt=(rd.data().acceptedCount||0)+1;
  if(cnt>=3){try{await deleteDoc(doc(db,"posts",pid))}catch(e){}await updateDoc(doc(db,"reports",rid),{status:'deleted',acceptedCount:cnt})}
  else{await updateDoc(doc(db,"reports",rid),{acceptedCount:cnt})}
  toast('✅ ('+cnt+'/3)');pReportsControl();
};
window.rejectReport=async function(rid){await updateDoc(doc(db,"reports",rid),{status:'rejected'});toast('❌');pReportsControl()};

async function pNotifControl(){openModalHTML('<h3>🔔 إشعار</h3><input id="nt" placeholder="العنوان"><textarea id="nb" placeholder="النص" rows="2" style="width:100%;padding:10px;border-radius:14px;border:2px solid #e2e8f0;margin-bottom:6px"></textarea><button class="btn-save" onclick="sendGN()">📨 إرسال</button>')}
window.sendGN=async function(){var t=document.getElementById('nt').value.trim();if(!t)return toast('أدخل عنواناً',false);await addDoc(collection(db,"global_notifications"),{title:t,body:document.getElementById('nb').value,timestamp:Date.now()});toast('📨 تم');closeModal()};

async function pProjectControl(){
  openModalHTML('<h3>📋 المشاريع</h3><div id="prc">⏳</div>');
  var s=await getDocs(collection(db,"projects"));var list='';
  if(s.empty){list='<div class="empty-state"><p>لا مشاريع</p></div>'}else{
    s.forEach(function(d){var p=d.data();list+='<div class="list-item"><div style="display:flex;align-items:center;gap:8px;flex:1">'+(p.imageUrl?'<img src="'+p.imageUrl+'" style="width:35px;height:35px;border-radius:10px;object-fit:cover">':'')+'<div><strong>'+(p.title||'بدون عنوان')+'</strong><br><small>'+(p.currentAmount||0).toLocaleString()+'/'+(p.targetAmount||0).toLocaleString()+' DDO</small></div></div><button onclick="delProj(\''+d.id+'\')">حذف</button></div>'});
  }
  document.getElementById('prc').innerHTML=list;
}
window.delProj=async function(id){await deleteDoc(doc(db,"projects",id));toast('🗑️');pProjectControl()};

async function pDdoControl(){var r=await getSet('ddo_exchange_rate',1);openModalHTML('<h3>💎 DDO</h3><label>1 DDO = كم عملة</label><input id="g1" type="number" value="'+r+'"><button class="btn-save" onclick="saveDdo()">💾 حفظ</button>')}
window.saveDdo=async function(){await setSet('ddo_exchange_rate',+document.getElementById('g1').value);toast('✅');closeModal()};

// ========== المصادقة ==========
onAuthStateChanged(auth,async function(u){
  if(u&&ADMINS.indexOf(u.email)!==-1){renderGrid()}
  else if(u){document.body.innerHTML='<div style="color:#fff;text-align:center;padding:80px"><h2>غير مصرح</h2></div>'}
  else{
    document.body.innerHTML='<div style="color:#fff;text-align:center;padding:80px 20px"><h2>تسجيل الدخول</h2><input id="le" placeholder="البريد" style="padding:12px;margin:6px;border-radius:16px;border:none;width:260px;text-align:center"><br><input id="lp" type="password" placeholder="كلمة المرور" style="padding:12px;margin:6px;border-radius:16px;border:none;width:260px;text-align:center"><br><button onclick="doLogin()" style="padding:12px 30px;border-radius:24px;border:none;background:#fbbf24;font-weight:bold;cursor:pointer;margin-top:12px">دخول</button><p id="err" style="color:#ef4444;margin-top:10px"></p></div>';
    window.doLogin=async function(){try{await signInWithEmailAndPassword(auth,document.getElementById('le').value,document.getElementById('lp').value)}catch(e){document.getElementById('err').textContent='❌ '+e.message}}
  }
});
</script>
