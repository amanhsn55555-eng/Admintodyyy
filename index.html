<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم المركزية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Tajawal',sans-serif}
    body{background:#0f172a;min-height:100vh;color:#1e293b;display:flex;flex-direction:column}
    .header{background:linear-gradient(145deg,#f8fafc,#e2e8f0);box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,.1);border-radius:25px;margin:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:20px;font-weight:800}
    .header button{background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:20px;font-weight:bold;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:12px;flex:1;overflow-y:auto}
    .card-btn{background:linear-gradient(145deg,#f8fafc,#e2e8f0);box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,.1);border:none;border-radius:20px;padding:14px 6px;cursor:pointer;text-align:center;font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:5px}
    .card-btn i{font-size:22px;color:#fbbf24}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:999;display:none;align-items:center;justify-content:center}
    .modal.active{display:flex}
    .modal-box{background:linear-gradient(145deg,#f8fafc,#e2e8f0);box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,.1);border-radius:28px;padding:18px 14px;width:94%;max-width:550px;max-height:80vh;overflow-y:auto;position:relative}
    .modal-box h3{margin-bottom:12px;font-size:17px;border-bottom:2px solid #e2e8f0;padding-bottom:8px}
    .modal-box label{display:block;margin:8px 0 3px;font-weight:700;font-size:12px}
    .modal-box input,.modal-box select,.modal-box textarea{width:100%;padding:9px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:12px;margin-bottom:3px}
    .close-btn{position:absolute;top:6px;left:10px;background:none;border:none;font-size:18px;cursor:pointer;color:#64748b}
    .toggle-row{display:flex;align-items:center;gap:8px;margin:8px 0}
    .toggle{position:relative;width:44px;height:24px;display:inline-block}
    .toggle input{display:none}
    .toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:24px;cursor:pointer;transition:.3s}
    .toggle-slider::before{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.3s}
    input:checked+.toggle-slider{background:#10b981}
    input:checked+.toggle-slider::before{transform:translateX(20px)}
    .btn-save{width:100%;padding:10px;border:none;border-radius:18px;background:#10b981;color:#fff;font-weight:bold;cursor:pointer;margin-top:8px;font-size:13px}
    .btn-danger{background:#ef4444!important}
    .btn-info{background:#3b82f6!important}
    .btn-sm{padding:5px 8px;font-size:10px;width:auto;margin:1px}
    .list-item{background:#fff;border-radius:12px;padding:8px 10px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;font-size:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);gap:6px}
    .list-item button{background:#ef4444;color:#fff;border:none;padding:4px 8px;border-radius:12px;cursor:pointer;font-size:10px}
    .mini-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;border:2px solid #fbbf24;flex-shrink:0}
    .mini-avatar img{width:100%;height:100%;object-fit:cover}
    .mini-img{width:40px;height:40px;border-radius:10px;object-fit:cover;flex-shrink:0;border:2px solid #e2e8f0}
    .tag{display:inline-block;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:600;margin:1px}
    #toast{position:fixed;bottom:20px;left:20px;right:20px;text-align:center;background:#1e293b;color:#fff;padding:12px;border-radius:30px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;max-width:350px;margin:auto;font-weight:600;font-size:13px}
    #toast.show{opacity:1;bottom:28px}
    .empty-state{text-align:center;padding:25px;color:#94a3b8}
    .withdraw-req{background:#fff;border-radius:14px;padding:12px;margin:8px 0;box-shadow:0 2px 6px rgba(0,0,0,.06);border-right:4px solid #f59e0b}
    .withdraw-req .actions{display:flex;gap:6px;margin-top:8px}
    .withdraw-req .actions button{flex:1;padding:8px;border-radius:16px;border:none;font-weight:bold;cursor:pointer;color:#fff;font-size:12px}
    .well-card{border:2px solid #2dd4bf;border-radius:16px;padding:12px;margin:6px 0;background:#f0fdfa}
    .level-badge{display:inline-block;background:#2dd4bf;color:#000;padding:3px 10px;border-radius:16px;font-weight:800;font-size:11px}
    .post-preview{background:#f8fafc;border-radius:8px;padding:6px;margin:2px 0;font-size:11px;color:#64748b}
    .img-preview{width:70px;height:70px;border-radius:14px;object-fit:cover;margin:6px 0;border:2px solid #e2e8f0;display:block}
    .search-card{background:#f8fafc;border-radius:14px;padding:10px;display:flex;align-items:center;gap:8px;margin:6px 0}
  </style>
</head>
<body>
<div class="header">
  <h1><i class="fas fa-crown" style="color:#fbbf24;"></i> لوحة التحكم</h1>
  <button onclick="window.open('https://amanhsn55555-eng.github.io/Admin-masengar-tody/','_blank')"><i class="fab fa-facebook-messenger"></i> الماسنجر</button>
</div>
<div class="grid" id="mainGrid"></div>
<div id="toast"></div>
<div class="modal" id="modal">
  <div class="modal-box">
    <button class="close-btn" onclick="document.getElementById('modal').classList.remove('active')">&times;</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, collection, query, where, writeBatch, addDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

const fc={apiKey:"AIzaSyCPBrZMo6IYCwCDYV3HEfNcUmLUITR6VRc",authDomain:"elahbes.firebaseapp.com",projectId:"elahbes",storageBucket:"elahbes.firebasestorage.app",messagingSenderId:"800207969145",appId:"1:800207969145:web:aa19b725d1c92dd48fada8"};
const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);
window.auth=auth;

const ADMINS=['ad5@5.com','admin@admin.com','hsn5@H.com'];

function toast(m,ok){ok=ok!==false;var t=document.getElementById('toast');t.textContent=m;t.style.background=ok?'#10b981':'#ef4444';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function openM(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modal').classList.add('active')}
async function gSet(k,f){try{var s=await getDoc(doc(db,"admin_settings",k));return s.exists()?s.data().value:f}catch(e){return f}}
async function sSet(k,v){await setDoc(doc(db,"admin_settings",k),{value:v,updatedAt:Date.now()})}
function av(u){if(!u)return'👤';if(u.avatarType==='image'&&u.avatarUrl)return'<img src="'+u.avatarUrl+'" style="width:100%;height:100%;object-fit:cover">';return u.emoji||'👤'}
async function gUser(uid){try{var d=await getDoc(doc(db,"users",uid));if(d.exists()){var u=d.data();u.uid=uid;return u}}catch(e){}return{uid:uid,username:'مستخدم',emoji:'👤',userId:uid.slice(0,6)}}
async function gRes(uid){try{var d=await getDoc(doc(db,"resources",uid));if(d.exists())return d.data()}catch(e){}return{money:0,gold:0,elixir:0,oil:0,ddo:0}}
async function sUser(sv){
  if(!sv)return null;
  var q=await getDocs(query(collection(db,"users"),where("userId","==",sv)));
  if(!q.empty){var u=q.docs[0].data();u.uid=q.docs[0].id;return u}
  q=await getDocs(query(collection(db,"users"),where("email","==",sv)));
  if(!q.empty){var u=q.docs[0].data();u.uid=q.docs[0].id;return u}
  var all=await getDocs(collection(db,"users"));var f=null;
  all.forEach(function(d){if(f)return;var u=d.data();if((u.username||'').toLowerCase().includes(sv.toLowerCase())){f=u;f.uid=d.id}});
  return f;
}
function fNum(n){return(n||0).toLocaleString('ar-SA')}

var panels=[
  {id:'dash',i:'fa-tachometer-alt',t:'📊 ملخص'},
  {id:'regRes',i:'fa-coins',t:'💰 عملات'},
  {id:'regLock',i:'fa-lock',t:'🔒 قيود'},
  {id:'regOn',i:'fa-user-check',t:'🚪 تسجيل'},
  {id:'posts',i:'fa-newspaper',t:'📰 منشورات'},
  {id:'stories',i:'fa-clock',t:'⏰ قصص'},
  {id:'rooms',i:'fa-door-open',t:'🚪 غرف'},
  {id:'shop',i:'fa-store',t:'🛒 متجر'},
  {id:'oil',i:'fa-oil-can',t:'🛢️ آبار'},
  {id:'rich',i:'fa-crown',t:'👑 أثرياء'},
  {id:'wallet',i:'fa-wallet',t:'💳 محافظ'},
  {id:'withdraw',i:'fa-hand-holding-usd',t:'📋 سحب'},
  {id:'charge',i:'fa-bolt',t:'⚡ شحن'},
  {id:'users',i:'fa-users',t:'👥 أعضاء'},
  {id:'stats',i:'fa-chart-bar',t:'📈 إحصاء'},
  {id:'ip',i:'fa-network-wired',t:'🌐 كشف'},
  {id:'chats',i:'fa-sms',t:'💭 محادثات'},
  {id:'reports',i:'fa-flag',t:'🚨 بلاغات'},
  {id:'notif',i:'fa-bell',t:'🔔 إشعار'},
  {id:'friendFee',i:'fa-user-friends',t:'💎 نسبة الصديق'},
  {id:'projects',i:'fa-project-diagram',t:'📋 مشاريع'},
  {id:'ddo',i:'fa-gem',t:'💎 DDO'}
  
];

function grid(){var h='';for(var i=0;i<panels.length;i++){var p=panels[i];h+='<button class="card-btn" onclick="go(\''+p.id+'\')"><i class="fas '+p.i+'"></i><span>'+p.t+'</span></button>'}document.getElementById('mainGrid').innerHTML=h}

window.go=async function(id){
  switch(id){
   
    case'dash':await pDash();break;
    case'friendFee':await pFriendFee();break;
    case'regRes':await pRegRes();break;
    case'regLock':await pRegLock();break;
    case'regOn':await pRegOn();break;
    case'posts':await pPosts();break;
    case'stories':await pStories();break;
    case'rooms':await pRooms();break;
    case'shop':await pShop();break;
    case'oil':await pOil();break;
    case'rich':await pRich();break;
    case'wallet':await pWallet();break;
    case'withdraw':await pWithdraw();break;
    case'charge':await pCharge();break;
    case'users':await pUsers();break;
    case'stats':await pStats();break;
    case'ip':await pIp();break;
    case'chats':await pChats();break;
    case'reports':await pReports();break;
    case'notif':await pNotif();break;
    case'projects':await pProjects();break;
    case'ddo':await pDdo();break;
  }
};

  
// ========== ملخص ==========
  
  // ========== 🆕 نسبة الصديق ==========
async function pFriendFee(){
  var fee = await gSet('friend_fee_percent', 1);
  var enabled = await gSet('friend_fee_enabled', true);
  
  openM(
    '<h3>💎 نسبة استقطاع الصديق</h3>' +
    '<p style="color:#64748b;font-size:12px;margin-bottom:12px">تخصم من كل عملية سحب وتحول لصاحب المعرف</p>' +
    '<label>النسبة %</label>' +
    '<input id="feePct" type="number" value="' + fee + '" min="0" max="100" step="0.5">' +
    '<div class="toggle-row"><span>تفعيل:</span><label class="toggle"><input id="feeEn" type="checkbox" ' + (enabled ? 'checked' : '') + '><span class="toggle-slider"></span></label></div>' +
    '<div style="background:#fef3c7;border-radius:12px;padding:10px;margin:8px 0;text-align:center;font-size:13px">' +
    '💰 مثال: 1000 TMX → <strong id="feeEx">' + Math.floor(1000 * fee / 100) + '</strong> TMX للصديق' +
    '</div>' +
    '<button class="btn-save" onclick="svFee()">💾 حفظ</button>'
  );
  
  document.getElementById('feePct').addEventListener('input', function(){
    var v = parseFloat(this.value) || 0;
    document.getElementById('feeEx').textContent = Math.floor(1000 * v / 100);
  });
}

window.svFee = async function() {
  var p = parseFloat(document.getElementById('feePct').value) || 0;
  var en = document.getElementById('feeEn').checked;
  await sSet('friend_fee_percent', p);
  await sSet('friend_fee_enabled', en);
  toast('✅ تم');
  document.getElementById('modal').classList.remove('active');
};

  async function pDash(){
  openM('<h3>📊 ملخص</h3><div id="dc" style="text-align:center">⏳</div>');
  var users=await getDocs(collection(db,"users"));
  var posts=await getDocs(collection(db,"posts"));
  var rooms=await getDocs(collection(db,"rooms"));
  var products=await getDocs(collection(db,"products"));
  var resources=await getDocs(collection(db,"resources"));
  var reports=await getDocs(collection(db,"reports"));
  var tm=0,tg=0,te=0,to=0,td=0;
  resources.forEach(function(d){var r=d.data();tm+=r.money||0;tg+=r.gold||0;te+=r.elixir||0;to+=r.oil||0;td+=r.ddo||0});
  var tc=0;posts.forEach(function(d){tc+=(d.data().comments||[]).length});
  document.getElementById('dc').innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">'+
    '<div style="background:#fff;border-radius:14px;padding:10px"><div style="font-size:22px;font-weight:900">'+users.size+'</div><small>👥 أعضاء</small></div>'+
    '<div style="background:#fff;border-radius:14px;padding:10px"><div style="font-size:22px;font-weight:900">'+posts.size+'</div><small>📰 منشورات</small></div>'+
    '<div style="background:#fff;border-radius:14px;padding:10px"><div style="font-size:22px;font-weight:900">'+rooms.size+'</div><small>🚪 غرف</small></div>'+
    '<div style="background:#fff;border-radius:14px;padding:10px"><div style="font-size:22px;font-weight:900">'+products.size+'</div><small>🛒 منتجات</small></div>'+
    '<div style="background:#fff;border-radius:14px;padding:10px"><div style="font-size:22px;font-weight:900">'+tc+'</div><small>💬 تعليقات</small></div>'+
    '<div style="background:#fff;border-radius:14px;padding:10px"><div style="font-size:22px;font-weight:900">'+reports.size+'</div><small>🚨 بلاغات</small></div>'+
    '</div>'+
    '<div style="background:#fef3c7;border-radius:12px;padding:10px;text-align:center;margin:3px 0"><strong>💰 إجمالي المال: '+fNum(tm)+'</strong></div>'+
    '<div style="background:#f0fdf4;border-radius:12px;padding:10px;text-align:center">💎 ذهب:'+fNum(tg)+' | إكسير:'+fNum(te)+' | نفط:'+fNum(to)+' | DDO:'+fNum(td)+'</div>';
}

// ========== إعدادات ==========
async function pRegRes(){
  var m=await gSet('default_money',1000),g=await gSet('default_gold',10),e=await gSet('default_elixir',10),o=await gSet('default_oil',10),d=await gSet('default_ddo',0);
  openM('<h3>💰 عملات الحساب الجديد</h3><label>المال</label><input id="v1" type="number" value="'+m+'"><label>الذهب</label><input id="v2" type="number" value="'+g+'"><label>الإكسير</label><input id="v3" type="number" value="'+e+'"><label>النفط</label><input id="v4" type="number" value="'+o+'"><label>DDO</label><input id="v5" type="number" value="'+d+'"><button class="btn-save" onclick="svRegRes()">💾 حفظ</button>');
}
window.svRegRes=async function(){await sSet('default_money',+document.getElementById('v1').value);await sSet('default_gold',+document.getElementById('v2').value);await sSet('default_elixir',+document.getElementById('v3').value);await sSet('default_oil',+document.getElementById('v4').value);await sSet('default_ddo',+document.getElementById('v5').value);toast('✅');document.getElementById('modal').classList.remove('active')}

async function pRegLock(){
  var me=await gSet('min_email_len',5),mp=await gSet('min_pass_len',6),bp=(await gSet('banned_passwords',[])).join(', ');
  openM('<h3>🔒 قيود التسجيل</h3><label>أدنى طول للبريد</label><input id="v1" type="number" value="'+me+'"><label>أدنى طول لكلمة المرور</label><input id="v2" type="number" value="'+mp+'"><label>كلمات مرور ممنوعة</label><input id="v3" value="'+bp+'"><button class="btn-save" onclick="svRegLock()">💾 حفظ</button>');
}
window.svRegLock=async function(){await sSet('min_email_len',+document.getElementById('v1').value);await sSet('min_pass_len',+document.getElementById('v2').value);var arr=document.getElementById('v3').value.split(',').map(function(s){return s.trim()}).filter(Boolean);await sSet('banned_passwords',arr);toast('✅');document.getElementById('modal').classList.remove('active')}

async function pRegOn(){
  var v=await gSet('registration_open',true);
  openM('<h3>🚪 التسجيل</h3><div class="toggle-row"><span>التسجيل مفتوح:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="svRegOn()">💾 حفظ</button>');
}
window.svRegOn=async function(){await sSet('registration_open',document.getElementById('v1').checked);toast('✅');document.getElementById('modal').classList.remove('active')}

// ========== منشورات ==========
async function pPosts(){
  openM('<h3>📰 المنشورات</h3><div id="pc">⏳</div>');
  var ap=await gSet('allow_posting',true),ac=await gSet('allow_comments',true);
  var s=await getDocs(collection(db,"posts"));var list='';
  var docs=[];s.forEach(function(d){docs.push({id:d.id,...d.data()})});
  docs.sort(function(a,b){return(b.timestamp||0)-(a.timestamp||0)});
  for(var i=0;i<docs.length;i++){var p=docs[i];
    var pi='';if(p.mediaUrl&&p.mediaType==='image')pi='<img src="'+p.mediaUrl+'" class="mini-img" style="margin-left:6px">';
    list+='<div class="list-item"><div style="display:flex;align-items:center;gap:8px;flex:1"><div class="mini-avatar">'+av(p)+'</div>'+pi+'<div><strong>'+(p.username||'مستخدم')+'</strong><div class="post-preview">'+(p.content||'').substring(0,40)+'...</div></div></div><button onclick="delP(\''+p.id+'\')">🗑️</button></div>'}
  document.getElementById('pc').innerHTML=
    '<div class="toggle-row"><span>السماح بالنشر:</span><label class="toggle"><input id="v1" type="checkbox" '+(ap?'checked':'')+'><span class="toggle-slider"></span></label></div>'+
    '<div class="toggle-row"><span>السماح بالتعليقات:</span><label class="toggle"><input id="v2" type="checkbox" '+(ac?'checked':'')+'><span class="toggle-slider"></span></label></div>'+
    '<button class="btn-save" onclick="svPosts()">💾 حفظ</button>'+
    '<button class="btn-save btn-danger" onclick="delAllP()" style="margin-top:3px">🗑️ حذف الكل</button>'+
    '<button class="btn-save btn-danger" onclick="delAllC()" style="margin-top:3px">🗑️ حذف التعليقات</button>'+
    '<div style="margin-top:8px;max-height:300px;overflow-y:auto">'+(list||'<div class="empty-state"><p>لا منشورات</p></div>')+'</div>';
}
window.svPosts=async function(){await sSet('allow_posting',document.getElementById('v1').checked);await sSet('allow_comments',document.getElementById('v2').checked);toast('✅');document.getElementById('modal').classList.remove('active')}
window.delP=async function(id){await deleteDoc(doc(db,"posts",id));toast('🗑️');pPosts()}
window.delAllP=async function(){if(!confirm('حذف الكل؟'))return;var s=await getDocs(collection(db,"posts"));var b=writeBatch(db);s.forEach(function(d){b.delete(d.ref)});await b.commit();toast('🗑️ تم');document.getElementById('modal').classList.remove('active')}
window.delAllC=async function(){if(!confirm('حذف التعليقات؟'))return;var s=await getDocs(collection(db,"posts"));var b=writeBatch(db);s.forEach(function(d){b.update(d.ref,{comments:[]})});await b.commit();toast('🗑️ تم');document.getElementById('modal').classList.remove('active')}

async function pStories(){
  var v=await gSet('allow_stories',true);
  openM('<h3>⏰ القصص</h3><div class="toggle-row"><span>السماح:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="svStories()">💾 حفظ</button><button class="btn-save btn-danger" onclick="delAllS()">🗑️ حذف الكل</button>');

    // 5. حذف جميع قصصه

    var batch3 = writeBatch(db);

    // 7. حذف بئر النفط

    // 8. حذف الغرف اللي يملكها
    var roomsSnap = await getDocs(query(collection(db, "rooms"), where("ownerId", "==", uid)));
    var batch4 = writeBatch(db);
    roomsSnap.forEach(d => batch4.delete(d.ref));
    await batch4.commit();
    
    // 9. حذف محادثاته
    var chatsSnap = await getDocs(query(collection(db, "chats"), where("participants", "array-contains", uid)));
    var batch5 = writeBatch(db);
    chatsSnap.forEach(d => batch5.delete(d.ref));
    await batch5.commit();
    
    // 10. حذف طلبات السحب
    var withdrawSnap = await getDocs(query(collection(db, "withdraw_requests"), where("uid", "==", uid)));
    var batch6 = writeBatch(db);
    withdrawSnap.forEach(d => batch6.delete(d.ref));
    await batch6.commit();
    
    // 11. حذف سجل المشاهدات
    try { await deleteDoc(doc(db, "viewed_posts", uid)); } catch(e) {}

      var allFollowers = socialSnap.data();
      var updates = {};
      for (var [followerUid, followingList] of Object.entries(allFollowers)) {
        if (followingList && followingList.includes(userId)) {
          updates[followerUid] = followingList.filter(id => id !== userId);
        }
      }
      // حذف قائمة متابعته هو
      updates[uid] = [];
      
      if (Object.keys(updates).length > 0) {
        await setDoc(doc(db, "social", "followers"), updates, { merge: true });
      }
    }
    
    toast('✅ تم تدمير الحساب بالكامل');
    pUsers(); // تحديث القائمة
  } catch(e) {
    toast('❌ خطأ: ' + e.message, false);
    console.error(e);
  }
};

  if(sip.length===0){

  if(sdv.length===0){
    html+='<p style="color:#64748b;text-align:center;padding:10px">✅ لا توجد حسابات أخرى</p>';
  } else {
    for(var j=0;j<sdv.length;j++){
      html+='<div class="list-item"><div style="display:flex;align-items:center;gap:8px"><div class="mini-avatar">'+av(sdv[j])+'</div><div><strong>'+(sdv[j].username||'مستخدم')+'</strong> <span class="tag">#'+(sdv[j].userId||sdv[j].uid.slice(0,6))+'</span>'+(sdv[j].banned?' <span class="tag" style="background:#fee2e2;color:#dc2626">🚫 محظور</span>':'')+'</div></div></div>';
    }
  }
  
  html+='</div></div>';

};

window.accR=async function(rid,pid){if(!confirm('قبول؟'))return;var rd=await getDoc(doc(db,"reports",rid));if(!rd.exists())return;var cnt=(rd.data().acceptedCount||0)+1;if(cnt>=3){try{await deleteDoc(doc(db,"posts",pid))}catch(e){}await updateDoc(doc(db,"reports",rid),{status:'deleted',acceptedCount:cnt})}else{await updateDoc(doc(db,"reports",rid),{acceptedCount:cnt})}toast('✅ ('+cnt+'/3)');pReports()}
