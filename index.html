<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم المركزية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Tajawal',sans-serif}
    body{background:#0f172a;min-height:100vh;color:#1e293b;display:flex;flex-direction:column}
    .header{
      background:linear-gradient(145deg,#f8fafc,#e2e8f0);
      box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,0.1),-1px -1px 4px rgba(255,255,255,0.6);
      border-radius:25px;margin:10px 10px 0;padding:14px 18px;
      display:flex;justify-content:space-between;align-items:center
    }
    .header h1{font-size:20px;font-weight:800}
    .header button{background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:20px;font-weight:bold;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:14px;flex:1;overflow-y:auto}
    .card-btn{
      background:linear-gradient(145deg,#f8fafc,#e2e8f0);
      box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,0.1),-1px -1px 4px rgba(255,255,255,0.6);
      border:none;border-radius:22px;padding:16px 8px;cursor:pointer;
      text-align:center;font-weight:700;font-size:12px;
      display:flex;flex-direction:column;align-items:center;gap:6px;transition:0.2s
    }
    .card-btn:hover{transform:translateY(-3px)}
    .card-btn i{font-size:24px;color:#fbbf24}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:999;display:none;align-items:center;justify-content:center}
    .modal.show{display:flex}
    .modal-box{
      background:linear-gradient(145deg,#f8fafc,#e2e8f0);
      box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,0.1),-1px -1px 4px rgba(255,255,255,0.6);
      border-radius:28px;padding:20px 14px;width:94%;max-width:580px;
      max-height:85vh;overflow-y:auto;position:relative
    }
    .modal-box h3{margin-bottom:14px;font-size:18px;border-bottom:2px solid #e2e8f0;padding-bottom:8px}
    .modal-box label{display:block;margin:10px 0 4px;font-weight:700;font-size:13px}
    .modal-box input,.modal-box select,.modal-box textarea{
      width:100%;padding:10px;border-radius:14px;border:2px solid #e2e8f0;
      background:#fff;font-size:13px;margin-bottom:4px
    }
    .close-modal{position:absolute;top:8px;left:12px;background:none;border:none;font-size:20px;cursor:pointer;color:#64748b}
    .toggle-row{display:flex;align-items:center;gap:10px;margin:10px 0}
    .toggle{position:relative;width:48px;height:26px;display:inline-block}
    .toggle input{display:none}
    .toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:26px;cursor:pointer;transition:0.3s}
    .toggle-slider::before{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:3px;transition:0.3s}
    input:checked+.toggle-slider{background:#10b981}
    input:checked+.toggle-slider::before{transform:translateX(22px)}
    .btn-save{width:100%;padding:12px;border:none;border-radius:20px;background:#10b981;color:#fff;font-weight:bold;cursor:pointer;margin-top:10px}
    .btn-danger{background:#ef4444!important}
    .btn-info{background:#3b82f6!important}
    .btn-warn{background:#f59e0b!important;color:#000!important}
    .list-item{
      background:#fff;border-radius:14px;padding:10px 12px;margin:6px 0;
      display:flex;justify-content:space-between;align-items:center;
      font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.04);gap:8px;flex-wrap:wrap
    }
    .list-item button{background:#ef4444;color:#fff;border:none;padding:5px 10px;border-radius:14px;cursor:pointer;font-size:11px;white-space:nowrap}
    .mini-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;border:2px solid #fbbf24;flex-shrink:0}
    .mini-avatar img{width:100%;height:100%;object-fit:cover}
    .mini-image{width:50px;height:50px;border-radius:12px;object-fit:cover;flex-shrink:0;border:2px solid #e2e8f0}
    .tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;margin:2px}
    #toast{position:fixed;bottom:20px;left:20px;right:20px;text-align:center;background:#1e293b;color:#fff;padding:13px;border-radius:35px;z-index:9999;opacity:0;transition:0.3s;pointer-events:none;max-width:380px;margin:auto;font-weight:600}
    #toast.show{opacity:1;bottom:32px}
    .empty-state{text-align:center;padding:30px;color:#94a3b8}
    .empty-state i{font-size:40px;opacity:0.3;margin-bottom:10px}
    .stat-box{
      background:linear-gradient(145deg,#f8fafc,#e2e8f0);
      box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,0.1);
      border-radius:20px;padding:16px;text-align:center;font-weight:700
    }
    .stat-box .big{font-size:28px;font-weight:900;color:#0f172a}
    .stat-box .lbl{font-size:11px;color:#64748b}
    .report-card{
      background:#fff;border-radius:16px;padding:14px;margin:10px 0;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);border-right:4px solid #ef4444
    }
    .report-card .actions{display:flex;gap:8px;margin-top:10px}
    .report-card .actions button{flex:1;padding:10px;border-radius:20px;border:none;font-weight:bold;cursor:pointer;color:#fff}
  </style>
</head>
<body>

<div class="header">
  <h1><i class="fas fa-crown" style="color:#fbbf24;"></i> لوحة التحكم</h1>
  <button onclick="signOut(auth)"><i class="fas fa-sign-out-alt"></i> خروج</button>
</div>

<div class="grid" id="mainGrid"></div>
<div id="toast"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="close-modal" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, collection, query, where, writeBatch, addDoc, increment, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPBrZMo6IYCwCDYV3HEfNcUmLUITR6VRc",
  authDomain: "elahbes.firebaseapp.com",
  projectId: "elahbes",
  storageBucket: "elahbes.firebasestorage.app",
  messagingSenderId: "800207969145",
  appId: "1:800207969145:web:aa19b725d1c92dd48fada8",
  measurementId: "G-EFT566SJMP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
window.auth = auth;

const ADMIN_EMAILS = ['ad5@5.com', 'admin@admin.com', 'hsn5@H.com'];

function toast(msg, ok){ ok = ok !== false;
  var t = document.getElementById('toast'); t.textContent = msg;
  t.style.background = ok ? '#10b981' : '#ef4444';
  t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
window.closeModal = function(){ document.getElementById('modal').classList.remove('show'); };
function openModalHTML(html){ document.getElementById('modalContent').innerHTML = html; document.getElementById('modal').classList.add('show'); }
async function getSet(key, fb){ try { var s = await getDoc(doc(db, "admin_settings", key)); return s.exists() ? s.data().value : fb; } catch(e) { return fb; } }
async function setSet(key, v){ await setDoc(doc(db, "admin_settings", key), { value: v, updatedAt: Date.now() }); }
function renderAvatar(u){ if(!u) return '👤'; if(u.avatarType==='image'&&u.avatarUrl) return '<img src="'+u.avatarUrl+'" style="width:100%;height:100%;object-fit:cover;">'; return u.emoji||'👤'; }
async function getUserData(uid){ try { var d = await getDoc(doc(db, "users", uid)); if(d.exists()){ var u = d.data(); u.uid = uid; return u; } } catch(e){} return { uid:uid, username:'مستخدم', emoji:'👤', userId:uid.slice(0,6) }; }
async function getUserResources(uid){ try { var d = await getDoc(doc(db, "resources", uid)); if(d.exists()) return d.data(); } catch(e){} return { money:0, gold:0, elixir:0, oil:0, ddo:0 }; }

async function searchUser(sv){
  if(!sv) return null;
  var q1 = await getDocs(query(collection(db,"users"), where("userId","==",sv)));
  if(!q1.empty){ var u = q1.docs[0].data(); u.uid = q1.docs[0].id; return u; }
  var q2 = await getDocs(query(collection(db,"users"), where("email","==",sv)));
  if(!q2.empty){ var u2 = q2.docs[0].data(); u2.uid = q2.docs[0].id; return u2; }
  if(sv.length>10){ var dd = await getDoc(doc(db,"users",sv)); if(dd.exists()){ var u3 = dd.data(); u3.uid = sv; return u3; } }
  var all = await getDocs(collection(db,"users")); var found = null;
  all.forEach(function(d){ if(found) return; var u = d.data(); if((u.username||'').toLowerCase().includes(sv.toLowerCase())){ found = u; found.uid = d.id; } });
  return found;
}

// ========== الألواح ==========
var panels = [
  { id: 'dashboard', i: 'fa-tachometer-alt', t: '📊 الملخص' },
  { id: 'regResources', i: 'fa-coins', t: '💰 عملات الجديد' },
  { id: 'regRestrict', i: 'fa-lock', t: '🔒 قيود التسجيل' },
  { id: 'regToggle', i: 'fa-user-check', t: '🚪 التسجيل' },
  { id: 'postControl', i: 'fa-newspaper', t: '📰 المنشورات' },
  { id: 'storyControl', i: 'fa-clock', t: '⏰ القصص' },
  { id: 'roomControl', i: 'fa-door-open', t: '🚪 الغرف' },
  { id: 'shopControl', i: 'fa-store', t: '🛒 المتجر' },
  { id: 'oilControl', i: 'fa-oil-can', t: '🛢️ الآبار' },
  { id: 'richControl', i: 'fa-crown', t: '👑 الأثرياء' },
  { id: 'walletControl', i: 'fa-wallet', t: '💳 المحافظ' },
  { id: 'withdrawRequests', i: 'fa-hand-holding-usd', t: '📋 طلبات السحب' },
  { id: 'chargeSection', i: 'fa-bolt', t: '⚡ شحن/استقطاع' },
  { id: 'userControl', i: 'fa-users', t: '👥 الأعضاء' },
  { id: 'userStats', i: 'fa-chart-bar', t: '📈 إحصائيات عضو' },
  { id: 'ipDetect', i: 'fa-network-wired', t: '🌐 كشف الحسابات' },
  { id: 'chatControl', i: 'fa-sms', t: '💭 المحادثات' },
  { id: 'reportsControl', i: 'fa-flag', t: '🚨 البلاغات' },
  { id: 'notifControl', i: 'fa-bell', t: '🔔 إشعار عام' },
  { id: 'projectControl', i: 'fa-project-diagram', t: '📋 المشاريع' },
  { id: 'ddoControl', i: 'fa-gem', t: '💎 DDO' }
];

function renderGrid(){
  var h = '';
  for(var i=0;i<panels.length;i++){ var p=panels[i]; h+='<button class="card-btn" onclick="openPanel(\''+p.id+'\')"><i class="fas '+p.i+'"></i><span>'+p.t+'</span></button>'; }
  document.getElementById('mainGrid').innerHTML = h;
}

window.openPanel = async function(id){
  switch(id){
    case 'dashboard': await pDashboard(); break;
    case 'regResources': await pRegResources(); break;
    case 'regRestrict': await pRegRestrict(); break;
    case 'regToggle': await pRegToggle(); break;
    case 'postControl': await pPostControl(); break;
    case 'storyControl': await pStoryControl(); break;
    case 'roomControl': await pRoomControl(); break;
    case 'shopControl': await pShopControl(); break;
    case 'oilControl': await pOilControl(); break;
    case 'richControl': await pRichControl(); break;
    case 'walletControl': await pWalletControl(); break;
    case 'withdrawRequests': await pWithdrawRequests(); break;
    case 'chargeSection': await pChargeSection(); break;
    case 'userControl': await pUserControl(); break;
    case 'userStats': await pUserStats(); break;
    case 'ipDetect': await pIpDetect(); break;
    case 'chatControl': await pChatControl(); break;
    case 'reportsControl': await pReportsControl(); break;
    case 'notifControl': await pNotifControl(); break;
    case 'projectControl': await pProjectControl(); break;
    case 'ddoControl': await pDdoControl(); break;
  }
};

// ========== 🆕 الملخص ==========
async function pDashboard(){
  openModalHTML('<h3>📊 ملخص المنصة</h3><div id="dashContent"><p style="text-align:center;">⏳ جاري التحميل...</p></div>');
  var users = await getDocs(collection(db,"users"));
  var posts = await getDocs(collection(db,"posts"));
  var rooms = await getDocs(collection(db,"rooms"));
  var products = await getDocs(collection(db,"products"));
  var stories = await getDocs(collection(db,"stories"));
  var resources = await getDocs(collection(db,"resources"));
  var reports = await getDocs(collection(db,"reports"));
  
  var totalMoney = 0, totalGold = 0, totalElixir = 0, totalOil = 0, totalDdo = 0;
  resources.forEach(function(d){ var r = d.data(); totalMoney += r.money||0; totalGold += r.gold||0; totalElixir += r.elixir||0; totalOil += r.oil||0; totalDdo += r.ddo||0; });
  
  var totalLikes = 0, totalComments = 0;
  posts.forEach(function(d){ var p = d.data(); totalLikes += p.likes||0; totalComments += (p.comments||[]).length; });
  
  document.getElementById('dashContent').innerHTML =
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">'+
    '<div class="stat-box"><div class="big">'+users.size+'</div><div class="lbl">👥 الأعضاء</div></div>'+
    '<div class="stat-box"><div class="big">'+posts.size+'</div><div class="lbl">📰 المنشورات</div></div>'+
    '<div class="stat-box"><div class="big">'+rooms.size+'</div><div class="lbl">🚪 الغرف</div></div>'+
    '<div class="stat-box"><div class="big">'+products.size+'</div><div class="lbl">🛒 المنتجات</div></div>'+
    '<div class="stat-box"><div class="big">'+stories.size+'</div><div class="lbl">⏰ القصص</div></div>'+
    '<div class="stat-box"><div class="big">'+totalComments+'</div><div class="lbl">💬 التعليقات</div></div>'+
    '<div class="stat-box"><div class="big">'+totalLikes+'</div><div class="lbl">❤️ الإعجابات</div></div>'+
    '<div class="stat-box"><div class="big">'+reports.size+'</div><div class="lbl">🚨 البلاغات</div></div>'+
    '<div class="stat-box"><div class="big">'+(totalMoney/1000000).toFixed(1)+'M</div><div class="lbl">💰 إجمالي المال</div></div>'+
    '</div>'+
    '<div style="background:#fef3c7;border-radius:16px;padding:14px;text-align:center;">'+
    '<strong>💎 ملخص العملات:</strong> 🪙 ذهب: '+totalGold.toLocaleString()+' | 🧪 إكسير: '+totalElixir.toLocaleString()+' | 🛢️ نفط: '+totalOil.toLocaleString()+' | 💎 DDO: '+totalDdo.toLocaleString()+
    '</div>';
}

// ========== 1-3) الإعدادات الأساسية ==========
async function pRegResources(){
  var m=await getSet('default_money',1000),g=await getSet('default_gold',10),e=await getSet('default_elixir',10),o=await getSet('default_oil',10),d=await getSet('default_ddo',0);
  openModalHTML('<h3>💰 عملات الحساب الجديد</h3><label>المال</label><input id="v1" type="number" value="'+m+'"><label>الذهب</label><input id="v2" type="number" value="'+g+'"><label>الإكسير</label><input id="v3" type="number" value="'+e+'"><label>النفط</label><input id="v4" type="number" value="'+o+'"><label>DDO</label><input id="v5" type="number" value="'+d+'"><button class="btn-save" onclick="saveRegResources()">💾 حفظ</button>');
}
window.saveRegResources = async function(){ await setSet('default_money',+document.getElementById('v1').value); await setSet('default_gold',+document.getElementById('v2').value); await setSet('default_elixir',+document.getElementById('v3').value); await setSet('default_oil',+document.getElementById('v4').value); await setSet('default_ddo',+document.getElementById('v5').value); toast('✅ تم'); closeModal(); };

async function pRegRestrict(){
  var me=await getSet('min_email_len',5),mp=await getSet('min_pass_len',6),bp=(await getSet('banned_passwords',[])).join(', ');
  openModalHTML('<h3>🔒 قيود التسجيل</h3><label>أدنى طول للبريد</label><input id="v1" type="number" value="'+me+'"><label>أدنى طول لكلمة المرور</label><input id="v2" type="number" value="'+mp+'"><label>كلمات مرور ممنوعة (بفاصلة)</label><input id="v3" value="'+bp+'"><button class="btn-save" onclick="saveRegRestrict()">💾 حفظ</button>');
}
window.saveRegRestrict = async function(){ await setSet('min_email_len',+document.getElementById('v1').value); await setSet('min_pass_len',+document.getElementById('v2').value); var arr=document.getElementById('v3').value.split(',').map(function(s){return s.trim();}).filter(Boolean); await setSet('banned_passwords',arr); toast('✅ تم'); closeModal(); };

async function pRegToggle(){
  var v=await getSet('registration_open',true);
  openModalHTML('<h3>🚪 التسجيل</h3><div class="toggle-row"><span>التسجيل مفتوح:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="saveRegToggle()">💾 حفظ</button>');
}
window.saveRegToggle = async function(){ await setSet('registration_open',document.getElementById('v1').checked); toast('✅ تم'); closeModal(); };

// ========== 4) المنشورات ==========
async function pPostControl(){
  var ap=await getSet('allow_posting',true),ac=await getSet('allow_comments',true);
  openModalHTML('<h3>📰 المنشورات</h3><div class="toggle-row"><span>السماح بالنشر:</span><label class="toggle"><input id="v1" type="checkbox" '+(ap?'checked':'')+'><span class="toggle-slider"></span></label></div><div class="toggle-row"><span>السماح بالتعليقات:</span><label class="toggle"><input id="v2" type="checkbox" '+(ac?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="savePostControl()">💾 حفظ</button><button class="btn-save btn-danger" onclick="deleteAllPosts()">🗑️ حذف كل المنشورات</button>');
}
window.savePostControl = async function(){ await setSet('allow_posting',document.getElementById('v1').checked); await setSet('allow_comments',document.getElementById('v2').checked); toast('✅'); closeModal(); };
window.deleteAllPosts = async function(){ if(!confirm('حذف كل المنشورات؟'))return; var s=await getDocs(collection(db,"posts")); var b=writeBatch(db); s.forEach(function(d){b.delete(d.ref);}); await b.commit(); toast('🗑️ تم'); closeModal(); };

// ========== 5) القصص ==========
async function pStoryControl(){
  var v=await getSet('allow_stories',true);
  openModalHTML('<h3>⏰ القصص</h3><div class="toggle-row"><span>السماح بالقصص:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="saveStoryControl()">💾 حفظ</button><button class="btn-save btn-danger" onclick="deleteAllStories()">🗑️ حذف كل القصص</button>');
}
window.saveStoryControl = async function(){ await setSet('allow_stories',document.getElementById('v1').checked); toast('✅'); closeModal(); };
window.deleteAllStories = async function(){ if(!confirm('حذف الكل؟'))return; var s=await getDocs(collection(db,"stories")); var b=writeBatch(db); s.forEach(function(d){b.delete(d.ref);}); await b.commit(); toast('🗑️'); closeModal(); };

// ========== 6) الغرف ==========
async function pRoomControl(){
  openModalHTML('<h3>🚪 الغرف</h3><div id="rc"><p style="text-align:center;">⏳</p></div>');
  var v=await getSet('allow_create_rooms',true);
  var s=await getDocs(collection(db,"rooms")); var list='';
  if(s.empty){ list='<div class="empty-state"><p>لا غرف</p></div>'; } else {
    var docs=[]; s.forEach(function(d){docs.push({id:d.id,data:d.data()});});
    for(var i=0;i<docs.length;i++){ var r=docs[i].data; var img=r.roomImage||r.image||''; var owner=await getUserData(r.ownerId||'').catch(function(){return{};});
      list+='<div class="list-item"><div style="display:flex;align-items:center;gap:10px;flex:1;">'+(img?'<img src="'+img+'" class="mini-image">':'<div class="mini-avatar"><i class="fas fa-comments"></i></div>')+'<div><strong>'+(r.name||'غرفة')+'</strong><br><small>'+(r.members||[]).length+' عضو | '+(owner.username||'?')+'</small></div></div><button onclick="delRoom(\''+docs[i].id+'\')">حذف</button></div>'; }
  }
  document.getElementById('rc').innerHTML='<div class="toggle-row"><span>السماح بإنشاء الغرف:</span><label class="toggle"><input id="v1" type="checkbox" '+(v?'checked':'')+'><span class="toggle-slider"></span></label></div><button class="btn-save" onclick="saveRoomControl()">💾 حفظ</button><div style="margin-top:14px;">'+list+'</div>';
}
window.saveRoomControl = async function(){ await setSet('allow_create_rooms',document.getElementById('v1').checked); toast('✅'); closeModal(); };
window.delRoom = async function(id){ await deleteDoc(doc(db,"rooms",id)); toast('🗑️'); pRoomControl(); };

// ========== 7) المتجر ==========
async function pShopControl(){
  openModalHTML('<h3>🛒 المتجر</h3><div id="sc"></div>');
  var s=await getDocs(collection(db,"products")); var list='';
  if(s.empty){ list='<div class="empty-state"><p>لا منتجات</p></div>'; } else {

async function pWithdrawRequests(){

  try {
    var allDocs = await getDocs(collection(db, "withdraw_requests"));

    allDocs.forEach(function(d){
      var data = d.data();
      if (data.status === 'pending') {
        pendingList.push({ id: d.id, data: data });
      }
    });
    
    pendingList.sort(function(a, b){ return (b.data.createdAt || 0) - (a.data.createdAt || 0); });
    
    var list = '';
    if (pendingList.length === 0) {
      list = '<div class="empty-state"><i class="fas fa-check-circle" style="color:#10b981;"></i><p>✅ لا توجد طلبات سحب معلقة</p></div>';
    } else {
      for (var i = 0; i < pendingList.length; i++){
        var req = pendingList[i].data;
        var reqId = pendingList[i].id;
        var userData = req.userData || {};
        if (!userData.username && req.uid) {
          try { userData = await getUserData(req.uid); } catch(e) {}
        }
        var bg = (userData.colors && userData.colors.frame) ? userData.colors.frame : '#fbbf24';
        
        list += '<div style="background:#fff;border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-right:4px solid #f59e0b;">' +

          '<div class="mini-avatar" style="width:45px;height:45px;font-size:22px;border-color:'+bg+';">'+renderAvatar(userData)+'</div>' +
          '<div style="flex:1;"><strong>'+(userData.username||req.userName||'مستخدم')+'</strong> ' +
          '<span class="tag" style="background:#fef3c7;">#'+(userData.userId||req.userId||(req.uid||'').slice(0,6))+'</span>' +
          '<br><small>📧 '+(userData.email||req.userEmail||'?')+' | 🆔 '+(req.uid||'').slice(0,14)+'...</small></div></div>' +
          '<div style="font-size:24px;font-weight:800;color:#ef4444;text-align:center;">💵 '+((req.amount||0)).toLocaleString()+' TMX</div>' +
          '<div style="font-size:11px;color:#64748b;text-align:center;">🕐 '+new Date(req.createdAt).toLocaleString('ar-SA')+'</div>' +
          '<div style="display:flex;gap:8px;margin-top:10px;">' +
          '<button class="btn-save" style="flex:1;background:#10b981;" onclick="acceptW(\''+reqId+'\')">✅ قبول</button>' +
          '<button class="btn-save" style="flex:1;background:#ef4444;" onclick="rejectW(\''+reqId+'\')">❌ رفض</button></div></div>';
      }

    document.getElementById('wdc').innerHTML = '<div class="empty-state"><p>❌ خطأ: '+e.message+'</p></div>';
  }

window.acceptW = async function(reqId){
  if(!confirm('تأكيد قبول الطلب؟')) return;
  var reqDoc = await getDoc(doc(db,"withdraw_requests",reqId));

  await updateDoc(doc(db,"withdraw_requests",reqId),{status:'accepted',processedAt:Date.now()});
  toast('✅ تم القبول'); pWithdrawRequests();
};
window.rejectW = async function(reqId){
  if(!confirm('تأكيد رفض الطلب؟ سيعود المبلغ.')) return;
  var reqDoc = await getDoc(doc(db,"withdraw_requests",reqId));
  if(!reqDoc.exists()) return toast('غير موجود',false);
  var req = reqDoc.data();
  if(req.uid && req.amount) await updateDoc(doc(db,"resources",req.uid),{money:increment(req.amount)});
  await updateDoc(doc(db,"withdraw_requests",reqId),{status:'rejected',processedAt:Date.now()});

};

    '<p>💵 <strong>طلبات السحب:</strong> '+withdraws.length+' (مقبولة: '+withdraws.filter(function(w){return w.status==='accepted';}).length+' | مرفوضة: '+withdraws.filter(function(w){return w.status==='rejected';}).length+' | معلقة: '+withdraws.filter(function(w){return w.status==='pending';}).length+')</p>'+
    '<p>🎁 <strong>الهدايا:</strong> معطية: '+giftsGiven+' | مستلمة: '+giftsReceived+'</p>'+
    '<p>💱 <strong>عمليات المحفظة:</strong> '+walletOps.length+' عملية</p>'+
    '</div>';
  
  document.getElementById('stsResult').innerHTML=html;
};

// ========== 🆕 15) كشف الحسابات ==========
async function pIpDetect(){
  openModalHTML('<h3>🌐 كشف الحسابات المرتبطة</h3><div style="margin-bottom:10px;"><input id="ipSearch" placeholder="ابحث عن عضو..." style="width:100%;padding:10px;border-radius:14px;border:2px solid #e2e8f0;"><button class="btn-save" onclick="detectIP()">🔍 كشف</button></div><div id="ipResult"></div>');
}
window.detectIP = async function(){
  var sv=document.getElementById('ipSearch').value.trim();
  if(!sv) return toast('اكتب اسم أو معرف',false);
  var f=await searchUser(sv);
  if(!f) return toast('لم يتم العثور',false);
  
  var targetIP = f.ip || 'غير معروف';
  var targetDevice = f.device || 'غير معروف';
  
  var allUsers=await getDocs(collection(db,"users"));
  var sameIP=[],sameDevice=[];
  allUsers.forEach(function(d){
    var u=d.data();u.uid=d.id;
    if(u.ip===targetIP && u.uid!==f.uid) sameIP.push(u);
    if(u.device===targetDevice && u.uid!==f.uid) sameDevice.push(u);
  });
  
  var html='<div style="background:#fff;border-radius:16px;padding:14px;margin:10px 0;">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">'+
    '<div class="mini-avatar" style="width:50px;height:50px;font-size:24px;border-color:#fbbf24;">'+renderAvatar(f)+'</div>'+
    '<div><strong>'+(f.username||'مستخدم')+'</strong><br><small>IP: '+targetIP+'</small><br><small>الجهاز: '+(targetDevice||'').substring(0,40)+'...</small></div></div>'+
    '<h4 style="margin:10px 0;">🔗 حسابات بنفس IP ('+sameIP.length+'):</h4>';
  
  for(var i=0;i<sameIP.length;i++){
    var u=sameIP[i];
    html+='<div class="list-item"><div style="display:flex;align-items:center;gap:8px;"><div class="mini-avatar">'+renderAvatar(u)+'</div><div><strong>'+(u.username||'مستخدم')+'</strong> <span class="tag">#'+(u.userId||u.uid.slice(0,6))+'</span></div></div></div>';
  }
  
  html+='<h4 style="margin:10px 0;">📱 حسابات بنفس الجهاز ('+sameDevice.length+'):</h4>';
  for(var j=0;j<sameDevice.length;j++){
    var u2=sameDevice[j];
    html+='<div class="list-item"><div style="display:flex;align-items:center;gap:8px;"><div class="mini-avatar">'+renderAvatar(u2)+'</div><div><strong>'+(u2.username||'مستخدم')+'</strong> <span class="tag">#'+(u2.userId||u2.uid.slice(0,6))+'</span></div></div></div>';
  }
  
  html+='</div>';
  document.getElementById('ipResult').innerHTML=html;
};

// ========== 16) المحادثات ==========
async function pChatControl(){
  openModalHTML('<h3>💭 المحادثات</h3><div id="chc"><p style="text-align:center;">⏳</p></div>');
  var s=await getDocs(collection(db,"chats")); var list='';
  if(s.empty){ list='<div class="empty-state"><p>لا محادثات</p></div>'; } else {
    var docs=[]; s.forEach(function(d){docs.push({id:d.id,data:d.data()});});
    for(var i=0;i<docs.length;i++){ var c=docs[i].data; var p=c.participants||[]; var av='';
      for(var j=0;j<Math.min(p.length,2);j++){ var u=await getUserData(p[j]).catch(function(){return{};}); av+='<div class="mini-avatar" style="margin:1px;border-color:'+(u.colors?u.colors.frame||'#8b5cf6':'#8b5cf6')+';">'+renderAvatar(u)+'</div>'; }
      list+='<div class="list-item"><div style="display:flex;align-items:center;gap:8px;flex:1;"><div style="display:flex;">'+av+'</div><div><strong>محادثة</strong><br><small>'+p.length+' مشارك</small></div></div><button onclick="delChat(\''+docs[i].id+'\')">حذف</button></div>'; }
  }
  document.getElementById('chc').innerHTML=list;
}
window.delChat = async function(id){ await deleteDoc(doc(db,"chats",id)); toast('🗑️'); pChatControl(); };

// ========== 🆕 17) البلاغات ==========
async function pReportsControl(){
  openModalHTML('<h3>🚨 البلاغات</h3><div id="repc"><p style="text-align:center;">⏳</p></div>');
  var allR=await getDocs(collection(db,"reports"));
  var allP=await getDocs(collection(db,"posts"));
  var postMap={}; allP.forEach(function(d){postMap[d.id]=d.data();});
  
  var list='';
  if(allR.empty){ list='<div class="empty-state"><i class="fas fa-check-circle" style="color:#10b981;"></i><p>✅ لا توجد بلاغات</p></div>'; } else {
    allR.forEach(function(d){
      var r=d.data();
      if(r.status!=='pending') return;
      var post=postMap[r.postId]||{};
      list+='<div class="report-card">'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'+
        '<div class="mini-avatar" style="width:40px;height:40px;background:#fee2e2;color:#dc2626;"><i class="fas fa-flag"></i></div>'+
        '<div><strong>'+ (r.reporterName||'مستخدم') +'</strong> <span class="tag">#'+ (r.reporterId||'') +'</span>'+
        '<br><small>🕐 '+new Date(r.timestamp).toLocaleString('ar-SA')+' | 📊 '+ (r.reportCount||1) +' بلاغ</small></div></div>'+
        '<div style="background:#f8fafc;border-radius:10px;padding:10px;margin:8px 0;">'+
        '<strong>السبب:</strong> '+(r.reason||'غير محدد')+'<br>'+
        '<strong>المنشور:</strong> '+((post.content||'').substring(0,80))+'...<br>'+
        '<strong>صاحب المنشور:</strong> '+(r.postOwnerName||'?')+' #'+(r.postOwnerId||'')+'</div>'+
        '<div class="actions">'+
        '<button class="btn-accept" style="background:#10b981;" onclick="acceptReport(\''+d.id+'\',\''+r.postId+'\')">✅ قبول</button>'+
        '<button class="btn-reject" style="background:#ef4444;" onclick="rejectReport(\''+d.id+'\')">❌ رفض</button></div></div>';
    });
  }
  document.getElementById('repc').innerHTML=list||'<div class="empty-state"><p>لا بلاغات معلقة</p></div>';
}
window.acceptReport = async function(rid,pid){
  if(!confirm('قبول البلاغ وحذف المنشور؟')) return;
  var rdoc=await getDoc(doc(db,"reports",rid));
  if(!rdoc.exists()) return;
  var cnt=(rdoc.data().acceptedCount||0)+1;
  if(cnt>=3){ try{ await deleteDoc(doc(db,"posts",pid)); }catch(e){} await updateDoc(doc(db,"reports",rid),{status:'deleted',acceptedCount:cnt}); }
  else { await updateDoc(doc(db,"reports",rid),{acceptedCount:cnt}); }
  toast('✅ تم ('+cnt+'/3)'); pReportsControl();
};
window.rejectReport = async function(rid){ await updateDoc(doc(db,"reports",rid),{status:'rejected'}); toast('❌ تم الرفض'); pReportsControl(); };

  else if(user){ document.body.innerHTML='<div style="color:#fff;text-align:center;padding:80px;"><i class="fas fa-lock" style="font-size:60px;color:#ef4444;"></i><h2 style="margin-top:20px;">غير مصرح</h2></div>'; }
  else {
    document.body.innerHTML='<div style="color:#fff;text-align:center;padding:80px 20px;">'+
      '<i class="fas fa-crown" style="font-size:50px;color:#fbbf24;"></i><h2 style="margin:20px 0;">تسجيل الدخول</h2>'+
      '<input id="le" placeholder="البريد" style="padding:12px;margin:6px;border-radius:16px;border:none;width:260px;text-align:center;"><br>'+
      '<input id="lp" type="password" placeholder="كلمة المرور" style="padding:12px;margin:6px;border-radius:16px;border:none;width:260px;text-align:center;"><br>'+
      '<button onclick="doLogin()" style="padding:12px 30px;border-radius:24px;border:none;background:#fbbf24;font-weight:bold;cursor:pointer;margin-top:12px;font-size:16px;">دخول</button>'+
      '<p id="err" style="color:#ef4444;margin-top:10px;"></p></div>';
    window.doLogin = async function(){ try { await signInWithEmailAndPassword(auth,document.getElementById('le').value,document.getElementById('lp').value); } catch(e){ document.getElementById('err').textContent='❌ '+e.message; } };
  }
});
